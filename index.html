<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meal Finder</title>

    <!-- Standard SEO -->
    <meta name="description" content="An all-in-one destination for all your recipes" />
    <meta name="author" content="Johaan Shobi" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Meal Finder" />
    <meta property="og:description" content="An all-in-one destination for homemade recipes" />
    <meta property="og:image" content="assets/images/logo.svg" />
    <meta property="og:image:alt" content="Meal Finder Logo" />
    <meta property="og:site_name" content="Meal Finder" />

    <!-- Twitter Cards -->
    <meta
      name="twitter:card"
      content="An all-in-one destination for all your recipes. Browse through our catalog & find your favorite recipes. Easy & quick to make recipes to make your day more enjoyable"
    />
    <meta name="twitter:title" content="Meal Finder" />
    <meta name="twitter:description" content="An all-in-one destination for all your recipes" />
    <meta name="twitter:image" content="assets/images/logo.svg" />

    <!--Bootstrap CDN-->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <!-- Favicon & Styles -->
    <link rel="icon" type="image/svg+xml" href="assets/images/logo.svg" />
    <link rel="apple-touch-icon" href="assets/images/logo.png" />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <header>
      <div class="container-fluid">
        <ul class="nav align-items-center">
          <!--Logo & Title-->
          <li class="nav-item me-auto">
            <a class="nav-link active text-white" aria-current="page" href="#"
              ><img class="me-3" src="assets/images/logo.svg" />Meal Finder</a
            >
          </li>
          <!--Hamburger Icon-->
          <li class="nav-item">
            <div class="dropdown">
              <button class="nav-link" data-bs-toggle="dropdown">
                <img src="assets/images/hamburger.svg" />
              </button>
              <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="#">Item 1</a></li>
                <li><a class="dropdown-item" href="#">Item 2</a></li>
                <li><a class="dropdown-item" href="#">Item 3</a></li>
              </ul>
            </div>
          </li>
        </ul>
      </div>
    </header>
    <main class="container-fluid p-0">
      <section
        class="hero w-100 min-vh-50 d-flex flex-column align-items-center justify-content-center overflow-auto text-white"
      >
        <div class="p-3 w-75 fs-3 fs-md-1 text-center font-bold font-monospace">
          Your one-stop destination to engulf in the aroma of homemade recipes
        </div>
        <div class="justify-content-center">
          <div class="d-flex p-0">
            <input
              type="text"
              class="rounded-pill p-2 inputbar m-0 border-0 d-flex"
              placeholder="Enter text here"
              aria-label="Search"
            />
            <button class="search_btn rounded-circle p-2 m-0 border-0">
              <img class="search min-vh-10" src="assets/images/search.svg" />
            </button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
